<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/image-Photoroom (27).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brookvalley Hotel HMS - Guest Reservation & Staff Portal</title>
    <meta name="description" content="Official guest reservation and staff management portal for Brookvalley Hotel & Resorts. Secure, real-time booking and room management." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(reg => console.log("Service Worker registered successfully:", reg.scope))
            .catch(err => console.error("Service Worker registration failed:", err));
        });
      }
    </script>
  </body>
</html>
